<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivGrab</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Main view -->
        <div id="capture-view">
            <header>
                <div class="logo-group">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                            stroke="currentColor" stroke-width="2" />
                        <circle cx="12" cy="12" r="3" fill="currentColor" />
                        <path d="M12 9V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M12 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M9 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M19 12H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <h1>DivGrab</h1>
                </div>
                <span class="badge">Beta</span>
            </header>

            <p class="subtitle">Select an element to instantly extract its structural HTML, computed CSS, and any
                available JS.</p>

            <button id="select-btn" class="btn primary-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                Select Element
            </button>
        </div>

        <!-- Success view -->
        <div id="success-view" class="hidden">
            <header>
                <div class="logo-group">
                    <svg class="logo-icon success-icon" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 13L9 17L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <h1>Captured!</h1>
                </div>
            </header>

            <p class="subtitle">Your component is ready. Copy the code blocks below to your project.</p>

            <div class="action-grid">
                <button id="copy-html-btn" class="btn secondary-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 3H4V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M8 7H20V21H8V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Copy HTML
                </button>
                <button id="copy-css-btn" class="btn secondary-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 3H4V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M8 7H20V21H8V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Copy CSS
                </button>
                <button id="copy-js-btn" class="btn secondary-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 3H4V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M8 7H20V21H8V7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Copy JS
                </button>
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <button id="reset-btn" class="btn ghost-btn">Select new element</button>
        </div>
    </div>

    <footer>
        <a href="mailto:basaksantanu700@gmail.com" id="report-link">Report issue</a>
    </footer>

    <script src="popup.js"></script>
</body>

</html>
